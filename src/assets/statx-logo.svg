<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="100%" height="100%">
  <!-- გრადიენტის დეფინიცია -->
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Tailwind blue-500 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Tailwind cyan-500 -->
    </linearGradient>
  </defs>

  <!-- გრაფიკის (ანალიტიკის) ხატულა -->
  <rect x="10" y="30" width="8" height="15" rx="4" fill="#64748b" />
  <rect x="25" y="20" width="8" height="25" rx="4" fill="#3b82f6" />
  <rect x="40" y="10" width="8" height="35" rx="4" fill="url(#primaryGrad)" />

  <!-- ტექსტი "StatX" -->
  <text x="60" y="42" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34" fill="#ffffff">Stat</text>
  <text x="128" y="42" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34" fill="url(#primaryGrad)">X</text>
</svg>
